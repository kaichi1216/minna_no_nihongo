<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなの日本語 — 単語と文型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
  background: #fdf8f0;
  color: #333;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.header {
  text-align: center;
  margin-bottom: 48px;
}
.header h1 {
  font-size: 28px;
  color: #c0392b;
  margin-bottom: 8px;
}
.header p {
  font-size: 15px;
  color: #888;
}

.cards {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 700px;
}

.card {
  background: white;
  border: 1px solid #e8ddd0;
  border-radius: 12px;
  padding: 36px 32px;
  width: 300px;
  text-decoration: none;
  color: #333;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.card .level {
  font-size: 14px;
  color: #c0392b;
  font-weight: bold;
  margin-bottom: 6px;
}
.card .title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 12px;
}
.card .desc {
  font-size: 14px;
  color: #888;
  line-height: 1.6;
}
.card .lessons {
  margin-top: 16px;
  font-size: 13px;
  color: white;
  background: #c0392b;
  padding: 6px 16px;
  border-radius: 20px;
}

.footer {
  margin-top: 48px;
  font-size: 12px;
  color: #bbb;
  text-align: center;
}

@media (max-width: 660px) {
  .card { width: 100%; max-width: 340px; }
  .header h1 { font-size: 22px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>みんなの日本語 — 単語と文型</h1>
  <p>互動式日語學習：單字查詢、文型整理、語音朗讀</p>
</div>

<div class="cards">
  <a class="card" href="shokyuu1/">
    <div class="level">初級 I</div>
    <div class="title">初級 I</div>
    <div class="desc">基礎文法與日常會話<br>動詞變化、形容詞、助詞</div>
    <div class="lessons">第1課 〜 第25課</div>
  </a>
  <a class="card" href="shokyuu2/">
    <div class="level">初級 II</div>
    <div class="title">初級 II</div>
    <div class="desc">進階文法與表達方式<br>被動、使役、敬語、條件</div>
    <div class="lessons">第26課 〜 第50課</div>
  </a>
</div>

<div class="footer">
  教材內容版權屬於原出版社，本站僅供個人學習用途。
</div>

</body>
</html>
